name: Build & Release

# Dispara ao fazer push de uma tag vX.Y.Z  →  cria release automaticamente
# Ou manualmente via Actions > "Run workflow"
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão a publicar (ex: 1.2.0 — sem o "v")'
        required: true
        default: '1.0.0'

# Permissão para criar releases e tags
permissions:
  contents: write

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # 1. BUILD — compila exe + instalador e publica artefatos
  # ══════════════════════════════════════════════════════════════════════════
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag:     ${{ steps.ver.outputs.tag }}

    steps:
      # ── 1. Código-fonte ─────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Determinar versão ────────────────────────────────────────────
      - name: Determinar versão
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "Versão de build: $VERSION"

      # ── 3. Python 3.12 ──────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 4. Dependências Python ──────────────────────────────────────────
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # ── 5. Gerar executável ─────────────────────────────────────────────
      - name: Build executável (PyInstaller)
        run: pyinstaller fb_backup_manager.spec --noconfirm

      - name: Verificar executável gerado
        shell: bash
        run: |
          test -f dist/fb_backup_manager/fb_backup_manager.exe \
            || (echo "::error::fb_backup_manager.exe não foi gerado" && exit 1)
          echo "Executável OK: $(du -sh dist/fb_backup_manager | cut -f1) total"

      # ── 6. Inno Setup ───────────────────────────────────────────────────
      - name: Instalar Inno Setup 6
        run: choco install innosetup --no-progress -y

      - name: Criar diretório data com placeholder
        shell: bash
        run: mkdir -p data && touch data/.gitkeep

      - name: Compilar instalador (Inno Setup)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = "${{ steps.ver.outputs.version }}"

          # Substitui a versão diretamente no .iss (mais confiável que /D override)
          $content = Get-Content installer.iss -Raw
          $content = $content -replace '#define AppVersion\s+"[^"]+"', "#define AppVersion `"$version`""
          Set-Content installer.iss -Value $content
          Write-Host "installer.iss atualizado para versão $version"

          Write-Host "Compilando instalador versão $version ..."
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC.exe falhou com código $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      - name: Verificar instalador gerado
        shell: bash
        run: |
          echo "Conteúdo de dist/:"
          ls dist/
          INSTALLER="dist/FBBackupManager_Setup_${{ steps.ver.outputs.version }}.exe"
          test -f "$INSTALLER" \
            || (echo "::error::Instalador não encontrado: $INSTALLER" && exit 1)
          echo "Instalador OK: $(du -sh "$INSTALLER" | cut -f1)"

      # ── 7. Publicar artefatos para os outros jobs ────────────────────────
      - name: Upload artefato — executável
        uses: actions/upload-artifact@v4
        with:
          name: exe-bundle
          path: dist/fb_backup_manager/
          retention-days: 1

      - name: Upload artefato — instalador
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: dist/FBBackupManager_Setup_${{ steps.ver.outputs.version }}.exe
          retention-days: 1

  # ══════════════════════════════════════════════════════════════════════════
  # 2. SMOKE TEST — instala e verifica o serviço Windows + API
  # ══════════════════════════════════════════════════════════════════════════
  smoke-test:
    needs: [build]
    runs-on: windows-latest

    steps:
      - name: Download executável
        uses: actions/download-artifact@v4
        with:
          name: exe-bundle
          path: fb_backup_manager

      # Configura banco e senha antes de instalar o serviço
      - name: Configurar banco (admin password)
        shell: pwsh
        working-directory: fb_backup_manager
        run: |
          .\fb_backup_manager.exe --admin-password "Teste1234!"
          Write-Host "Banco configurado."

      # Registra o serviço no SCM
      - name: Instalar serviço Windows
        shell: pwsh
        working-directory: fb_backup_manager
        run: |
          .\fb_backup_manager.exe --service install
          Write-Host "Serviço instalado."

      # Inicia o serviço via SCM
      - name: Iniciar serviço
        shell: pwsh
        run: |
          net start FBBackupManager
          Write-Host "Comando net start enviado."

      # Aguarda o serviço (e uvicorn) inicializarem completamente
      - name: Aguardar inicialização (25 s)
        shell: pwsh
        run: Start-Sleep -Seconds 25

      # Verifica estado no SCM
      - name: Verificar serviço RUNNING
        shell: pwsh
        run: |
          # sc.exe retorna array de linhas; juntar em string antes de testar
          $query = (sc.exe query FBBackupManager) -join " "
          Write-Host $query
          if ($query -notmatch "RUNNING") {
            Write-Error "::error::Serviço não está RUNNING"
            exit 1
          }
          Write-Host "Serviço RUNNING — OK"

      # Verifica que a API HTTP está respondendo
      - name: Verificar API respondendo (HTTP 200)
        shell: pwsh
        run: |
          try {
            $r = Invoke-WebRequest -Uri http://localhost:8099 -TimeoutSec 30 -UseBasicParsing
            Write-Host "HTTP $($r.StatusCode) — OK"
            if ($r.StatusCode -ne 200) {
              Write-Error "::error::API retornou $($r.StatusCode), esperado 200"
              exit 1
            }
          } catch {
            Write-Error "::error::Falha ao conectar em http://localhost:8099 — $_"
            exit 1
          }

      # Exibe log do serviço para diagnóstico (sempre, mesmo em falha)
      - name: Exibir log do serviço
        if: always()
        shell: pwsh
        working-directory: fb_backup_manager
        run: |
          if (Test-Path fb_backup_manager.log) {
            Write-Host "=== fb_backup_manager.log ==="
            Get-Content fb_backup_manager.log
          } else {
            Write-Host "Log não encontrado."
          }

      # Para e remove o serviço (always para garantir limpeza)
      - name: Parar e remover serviço
        if: always()
        shell: pwsh
        working-directory: fb_backup_manager
        run: |
          net stop FBBackupManager 2>$null; $true
          .\fb_backup_manager.exe --service remove 2>$null; $true
          Write-Host "Serviço removido."

  # ══════════════════════════════════════════════════════════════════════════
  # 3. RELEASE — cria o GitHub Release (apenas se smoke-test passou)
  # ══════════════════════════════════════════════════════════════════════════
  release:
    needs: [build, smoke-test]
    runs-on: windows-latest

    steps:
      - name: Download instalador
        uses: actions/download-artifact@v4
        with:
          name: installer
          path: dist

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: "FB Backup Manager v${{ needs.build.outputs.version }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Instalação

            1. Baixe `FBBackupManager_Setup_${{ needs.build.outputs.version }}.exe`
            2. Execute como **Administrador** na máquina Windows
            3. Siga o assistente — defina a senha de acesso durante a instalação
            4. Após instalar, acesse **http://localhost:8099** no navegador

            > O serviço Windows `FBBackupManager` é instalado e iniciado automaticamente.
          files: |
            dist/FBBackupManager_Setup_${{ needs.build.outputs.version }}.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
